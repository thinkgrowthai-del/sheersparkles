<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Page Not Found | Sheer Sparkles</title>
<meta name="robots" content="noindex, nofollow">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,500;0,600;0,700;1,400&display=swap" rel="stylesheet">
<style>
  :root{--charcoal:#0F172A;--deep:#020617;--cream:#F0FDF4;--gold:#84CC16;--gold-light:#A3E635;--blue:#1E3A5F;--blue-bright:#2563EB;--yellow:#FACC15;--text-body:#334155;--font-display:'Playfair Display',Georgia,serif;--font-body:Helvetica,Arial,sans-serif}
  *{margin:0;padding:0;box-sizing:border-box}
  body{font-family:var(--font-body);background:var(--deep);color:#fff;min-height:100vh;display:flex;align-items:center;justify-content:center;text-align:center;padding:2rem}
  .container{max-width:550px}
  .code{font-family:var(--font-display);font-size:8rem;font-weight:700;color:var(--gold);line-height:1;margin-bottom:1rem}
  h1{font-family:var(--font-display);font-size:2rem;font-weight:400;margin-bottom:1rem}
  p{font-size:1.05rem;color:rgba(255,255,255,0.6);line-height:1.7;margin-bottom:2rem}
  .btn{display:inline-flex;align-items:center;gap:.6rem;background:var(--gold);color:var(--charcoal);padding:1rem 2.2rem;text-decoration:none;font-size:.82rem;font-weight:600;letter-spacing:.12em;text-transform:uppercase;border-radius:40px;transition:all .35s}
  .btn:hover{background:var(--gold-light);transform:translateY(-2px);box-shadow:0 8px 30px rgba(132,204,22,.3)}
  .links{margin-top:2rem;display:flex;justify-content:center;gap:2rem;flex-wrap:wrap}
  .links a{color:rgba(255,255,255,0.5);text-decoration:none;font-size:.88rem;transition:color .3s}
  .links a:hover{color:var(--yellow)}
</style>
</head>
<body>
<div class="container">
  <div class="code">404</div>
  <h1>Page Not Found</h1>
  <p>The page you're looking for doesn't exist or has been moved. Let's get you back on track.</p>
  <a href="/" class="btn">Back to Homepage</a>
  <div class="links">
    <a href="/services">Services</a>
    <a href="/about">About Us</a>
    <a href="/contact">Get a Quote</a>
    <a href="/faq">FAQ</a>
  </div>
  <div class="links" style="margin-top:1rem;padding-top:1rem;border-top:1px solid rgba(255,255,255,0.08)">
    <a href="privacy-policy.html">Privacy Policy</a>
    <a href="terms-of-service.html">Terms of Service</a>
    <a href="terms-and-conditions.html">Terms &amp; Conditions</a>
  </div>
</div>
</body>
</html>
